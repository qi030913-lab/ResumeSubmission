services:
  postgres:
    image: postgres:16
    container_name: resume-automation-postgres
    environment:
      POSTGRES_DB: resume_automation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: resume-automation-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
